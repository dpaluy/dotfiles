# Linux-only Ghostty settings

# Keep the custom terminal actions available on Linux without reusing Super,
# which Hyprland reserves for window management and workspace navigation.
#
# Tabs
keybind = ctrl+shift+t=new_tab
keybind = ctrl+shift+w=close_surface
keybind = ctrl+shift+n=new_window
keybind = ctrl+shift+left=previous_tab
keybind = ctrl+shift+right=next_tab
keybind = alt+1=goto_tab:1
keybind = alt+2=goto_tab:2
keybind = alt+3=goto_tab:3
keybind = alt+4=goto_tab:4
keybind = alt+5=goto_tab:5

# Splits
keybind = super+d=new_split:right
keybind = super+shift+d=new_split:down
keybind = ctrl+shift+o=new_split:right
keybind = ctrl+shift+e=new_split:down
keybind = ctrl+shift+g=equalize_splits
keybind = ctrl+shift+enter=toggle_split_zoom

# Editing
keybind = shift+enter=text:\n
keybind = ctrl+shift+r=prompt_surface_title

# Clipboard and large split-resize steps
keybind = shift+insert=paste_from_clipboard
keybind = control+insert=copy_to_clipboard
keybind = super+control+shift+alt+arrow_down=resize_split:down,100
keybind = super+control+shift+alt+arrow_up=resize_split:up,100
keybind = super+control+shift+alt+arrow_left=resize_split:left,100
keybind = super+control+shift+alt+arrow_right=resize_split:right,100

# Fix general slowness on Hyprland.
async-backend = epoll
