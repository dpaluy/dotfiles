# macOS-only Ghostty settings

window-colorspace = display-p3

# Global hotkeys (work even when Ghostty is not focused)
keybind = global:super+,=toggle_visibility
keybind = global:ctrl+grave_accent=toggle_quick_terminal

# Tabs
keybind = super+t=new_tab
keybind = ctrl+shift+w=close_surface
keybind = super+n=new_window
keybind = super+left=previous_tab
keybind = super+right=next_tab
keybind = super+1=goto_tab:1
keybind = super+2=goto_tab:2
keybind = super+3=goto_tab:3
keybind = super+4=goto_tab:4
keybind = super+5=goto_tab:5

# Splits
keybind = super+d=new_split:right
keybind = super+shift+d=new_split:down
keybind = super+shift+e=equalize_splits
keybind = super+shift+f=toggle_split_zoom

# Editing
keybind = shift+enter=text:\n
keybind = ctrl+shift+t=prompt_surface_title

macos-option-as-alt = true
