tool_output_token_limit = 25000
web_search = "live"
suppress_unstable_features_warning = true
personality = "pragmatic"
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
model_verbosity = "low"
service_tier = "fast"

developer_instructions = """
Delegate only when useful: use fast_scan for read-only exploration, routine_worker for bounded implementation, and deep_worker for complex or high-risk work.
Keep simple tasks on the main agent.
Do not ask the user to choose a model unless the required model is unavailable.
"""

sandbox_mode = "danger-full-access"
approval_policy = "never"

[features]
unified_exec = true
shell_snapshot = true
default_mode_request_user_input = true
apps = true
personality = true
multi_agent = true
prevent_idle_sleep = true
guardian_approval = false
memories = true
goals = true

[features.multi_agent_v2]
enabled = true
hide_spawn_agent_metadata = false
tool_namespace = "agents"
max_concurrent_threads_per_session = 2

[agents]
max_depth = 1

[shell_environment_policy.set]
OMX_LORE_COMMIT_GUARD = "0"

[mcp_servers.qmd]
url = "http://localhost:8181/mcp"
