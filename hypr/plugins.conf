# Hyprland plugins (managed by hyprpm)
# Install: hyprpm add https://github.com/hyprwm/hyprland-plugins && hyprpm enable hyprbars

# Load plugins on Hyprland startup
exec-once = hyprpm reload -n

# Allow hyprpm to load plugins without permission popups
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# hyprbars: title bars for windows
# Docs: https://github.com/hyprwm/hyprland-plugins/tree/main/hyprbars
plugin {
    hyprbars {
        bar_height = 22
        bar_padding = 8
        bar_button_padding = 6
        bar_precedence_over_border = true
        bar_part_of_window = true
        bar_title_enabled = true
        bar_text_size = 11
        bar_text_font = JetBrainsMono Nerd Font

        # Buttons (right to left): close, maximize, minimize
        hyprbars-button = rgb(eb6f92), 12, , hyprctl dispatch killactive
        hyprbars-button = rgb(f6c177), 12, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(9ccfd8), 12, , hyprctl dispatch movetoworkspacesilent special

        on_double_click = hyprctl dispatch fullscreen 1
    }
}
