# Tmux Configuration

# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------

# True color support
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Allow terminal protocols (kitty graphics, etc.) to pass through
set -g allow-passthrough on

# Increase scrollback buffer
set -g history-limit 50000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't rename windows automatically
set -g allow-rename off

# Switch to another session when current is destroyed (don't drop to shell)
set -g detach-on-destroy off

# Use system clipboard
set -g set-clipboard on

# Enable mouse support
set -g mouse on

# Zero escape time for vim
set -gs escape-time 0

# Focus events for vim autoread
set -g focus-events on

# ------------------------------------------------------------------------------
# Prefix Key
# ------------------------------------------------------------------------------

# Use Ctrl+s as prefix (easier to reach than Ctrl+b)
set -g prefix2 C-s
bind C-s send-prefix -2

# ------------------------------------------------------------------------------
# Key Bindings
# ------------------------------------------------------------------------------

# Act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Switch windows with Ctrl+h/l
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Switch to last window
bind-key ";" last-window

# Swap windows left/right
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Copy mode vim-style
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Clear screen / clear scrollback history
bind C-l send-keys C-l
bind M-C-l send-keys C-l \; run 'sleep 0.05 && tmux clear-history'

# Sesh session switcher (fuzzy session picker with fzf popup)
bind-key "T" run-shell "sesh connect \"$(
	sesh list --icons | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
		--header ' ^a all ^t tmux ^g configs ^x zoxide ^d kill' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
		--bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
		--bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
		--bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡ )+reload(sesh list --icons)'
)\""

# ------------------------------------------------------------------------------
# Status Bar
# ------------------------------------------------------------------------------

set -g status-style bg='#333333',fg='#aaaaaa'
set -g status-left '#[bold]#S '
set -g status-left-length 20
set -g status-right "#[fg=white,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml) "
set -g status-right-length 60
set -g status-interval 3
set -g status-justify centre

# Show running command instead of window name when multiple panes are open
setw -g window-status-format "#I #{?#{e|>:#{window_panes},1},#{pane_current_command},#W}"
setw -g window-status-current-format "#[bold]#I #{?#{e|>:#{window_panes},1},#{pane_current_command},#W}"

# ------------------------------------------------------------------------------
# Appearance
# ------------------------------------------------------------------------------

# Dim inactive panes for visual focus
set-window-option -g window-active-style "fg=default"
set-window-option -g window-style "fg=#888888"

# Copy mode search highlights
set -g copy-mode-match-style "bg=#3d59a1"
set -g copy-mode-current-match-style "fg=black,bg=#e0af68"
set -g mode-style "bg=#364a82"

# Rounded popup borders
set -g popup-border-lines rounded

# ------------------------------------------------------------------------------
# Plugins (TPM)
# ------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

# Open URLs from terminal history with fzf (prefix + u)
set -g @plugin 'joshmedeski/tmux-fzf-url'
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="  " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Better mouse scrolling in alternate screen programs
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# Jump back to last command output (prefix + C)
set -g @plugin 'mskelton/tmux-last'
set -g @tmux-last-key C
set -g @tmux-last-pager "less +g -~ -r"
set -g @tmux-last-color on

run '~/.tmux/plugins/tpm/tpm'

# ------------------------------------------------------------------------------
# Local config
# ------------------------------------------------------------------------------

if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
